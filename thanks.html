<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You ❤️</title>

  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts: Playfair Display (headings) + Jost (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Custom Styles -->
  <style>
/* ==========================================================================
   DESIGN TOKENS
   Palette:  #FBEAEC (blush)  #F6E3D6 (champagne)  #EFD9B4 (soft gold)
             #FFFCF8 (card)   #4A2E35 (plum text)   #8B5D66 (muted rose)
             #B9873F (gold accent)
   Type:     Playfair Display (display, used sparingly)
             Jost (body / UI, light weights)
   ========================================================================== */

:root {
  --blush: #fbeaec;
  --champagne: #f6e3d6;
  --soft-gold: #efd9b4;
  --card-bg: #fffcf8;
  --plum: #4a2e35;
  --muted-rose: #8b5d66;
  --gold: #b9873f;
  --gold-soft: rgba(185, 135, 63, 0.35);
  --ring: rgba(74, 46, 53, 0.08);

  --font-display: "Playfair Display", "Georgia", serif;
  --font-body: "Jost", "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--font-body);
  color: var(--plum);
  overflow-x: hidden;

  /* Soft animated gradient background */
  background: linear-gradient(
    120deg,
    var(--blush),
    var(--champagne),
    var(--soft-gold),
    var(--champagne),
    var(--blush)
  );
  background-size: 300% 300%;
  animation: gradientDrift 22s ease-in-out infinite;
}

@keyframes gradientDrift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

/* ==========================================================================
   LAYOUT
   ========================================================================== */

.page-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 4rem 1rem;
  position: relative;
  z-index: 2;
}

/* ==========================================================================
   AMBIENT FLOATING HEARTS (background, decorative, generated by JS)
   ========================================================================== */

.ambient-hearts {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 1;
}

.ambient-heart {
  position: absolute;
  bottom: -10%;
  color: var(--gold);
  opacity: 0.16;
  will-change: transform, opacity;
  animation-name: floatUp;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.18;
  }
  50% {
    transform: translateY(-55vh) translateX(2vw) rotate(8deg);
  }
  90% {
    opacity: 0.12;
  }
  100% {
    transform: translateY(-110vh) translateX(-2vw) rotate(-6deg);
    opacity: 0;
  }
}

/* Canvas used for the "Send Love" burst */
#loveCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 50;
}

/* ==========================================================================
   THANK-YOU CARD
   ========================================================================== */

.thanks-card {
  position: relative;
  background: var(--card-bg);
  border-radius: 28px;
  padding: 3.25rem 2.5rem 2.5rem;
  text-align: center;
  box-shadow:
    0 30px 60px -20px rgba(74, 46, 53, 0.22),
    0 2px 0 rgba(255, 255, 255, 0.6) inset;
  border: 1px solid rgba(185, 135, 63, 0.18);
}

.seal {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.75rem;
}

.seal svg {
  animation: sealPulse 4s ease-in-out infinite;
  transform-origin: center;
}

@keyframes sealPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(185,135,63,0)); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 6px rgba(185,135,63,0.25)); }
}

.seal-ring {
  fill: none;
  stroke: var(--gold);
  stroke-width: 2.5;
  opacity: 0.55;
}

.seal-heart {
  fill: var(--gold);
  opacity: 0.85;
}

.eyebrow {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--muted-rose);
  font-size: 0.95rem;
  margin-bottom: 0.35rem;
}

.main-heading {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2.1rem, 5vw, 2.85rem);
  color: var(--plum);
  margin-bottom: 1.25rem;
  letter-spacing: 0.01em;
}

.heart-glyph {
  display: inline-block;
  animation: heartbeat 2.6s ease-in-out infinite;
  transform-origin: center;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.18); }
  30% { transform: scale(1); }
  45% { transform: scale(1.12); }
  60% { transform: scale(1); }
}

.message {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 1.05rem;
  line-height: 1.85;
  color: var(--plum);
  opacity: 0.88;
  max-width: 34rem;
  margin: 0 auto 2rem;
}

/* ==========================================================================
   BUTTON
   ========================================================================== */

.cta-wrap {
  margin-bottom: 1.75rem;
}

.send-love-btn {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 1rem;
  letter-spacing: 0.02em;
  color: #fff;
  background: linear-gradient(135deg, var(--gold), #d3a862);
  border: none;
  border-radius: 999px;
  padding: 0.75rem 2rem;
  box-shadow: 0 12px 24px -10px var(--gold-soft);
  transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
}

.send-love-btn:hover,
.send-love-btn:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 16px 30px -10px var(--gold-soft);
  filter: brightness(1.04);
  color: #fff;
}

.send-love-btn:active {
  transform: translateY(0) scale(0.98);
}

.send-love-btn:focus-visible {
  outline: 3px solid rgba(185, 135, 63, 0.45);
  outline-offset: 3px;
}

/* ==========================================================================
   DIVIDER + SIGNATURE
   ========================================================================== */

.card-divider {
  width: 64px;
  height: 1px;
  margin: 0 auto 1.25rem;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.6;
}

.signature {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 500;
  font-size: 1.05rem;
  color: var(--muted-rose);
  margin: 0;
}

/* ==========================================================================
   FADE-IN-UP ENTRANCE ANIMATIONS
   ========================================================================== */

.fade-in-up {
  opacity: 0;
  transform: translateY(18px);
  animation: fadeInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.delay-1 { animation-delay: 0.15s; }
.delay-2 { animation-delay: 0.35s; }
.delay-3 { animation-delay: 0.55s; }
.delay-4 { animation-delay: 0.75s; }
.delay-5 { animation-delay: 0.95s; }

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */

@media (max-width: 576px) {
  .thanks-card {
    padding: 2.5rem 1.5rem 2rem;
    border-radius: 22px;
  }

  .message {
    font-size: 1rem;
    line-height: 1.75;
  }

  .send-love-btn {
    width: 100%;
  }
}

/* ==========================================================================
   ACCESSIBILITY: respect reduced motion
   ========================================================================== */

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }

  body {
    animation: none;
  }
}

  </style>
</head>
<body>

  <!-- Ambient floating hearts live behind everything -->
  <div class="ambient-hearts" id="ambientHearts" aria-hidden="true"></div>

  <!-- Canvas layer for the "Send Love" burst animation -->
  <canvas id="loveCanvas" aria-hidden="true"></canvas>

  <main class="page-wrap">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">

          <!-- Thank-you card -->
          <section class="thanks-card fade-in-up" role="region" aria-label="Birthday thank you note">

            <!-- Seal / signature emblem -->
            <div class="seal fade-in-up delay-1" aria-hidden="true">
              <svg viewBox="0 0 100 100" width="56" height="56">
                <circle cx="50" cy="50" r="48" class="seal-ring" />
                <path
                  class="seal-heart"
                  d="M50 72 C 30 56, 16 44, 16 30 C 16 18, 26 10, 36 10 C 44 10, 49 15, 50 20 C 51 15, 56 10, 64 10 C 74 10, 84 18, 84 30 C 84 44, 70 56, 50 72 Z"
                />
              </svg>
            </div>

            <p class="eyebrow fade-in-up delay-1">A note, just for you</p>

            <h1 class="main-heading fade-in-up delay-2">Thank You <span class="heart-glyph">❤️</span></h1>

            <p class="message fade-in-up delay-3">
              Your warm birthday wishes, blessings made my day special.
              I&rsquo;m grateful for your love  and the time you took
              to wish me. Thank you all for being a part of my life.
              It truly means a lot. 🙏
            </p>

            <div class="cta-wrap fade-in-up delay-4">
              <button type="button" class="btn send-love-btn" id="sendLoveBtn">
                <span>Send Love</span> <span class="heart-glyph">❤️</span>
              </button>
            </div>

            <div class="card-divider fade-in-up delay-4" aria-hidden="true"></div>

            <p class="signature fade-in-up delay-5">With Gratitude <span class="heart-glyph">❤️</span></p>

          </section>

        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle (Popper included) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom Script -->
  <script>
/* ==========================================================================
   THANK-YOU PAGE — INTERACTIONS
   1. Ambient floating hearts drifting gently in the background
   2. "Send Love" button → gentle heart burst on the canvas
   All motion is soft, slow, and respects prefers-reduced-motion.
   ========================================================================== */

(function () {
  "use strict";

  const prefersReducedMotion = window.matchMedia(
    "(prefers-reduced-motion: reduce)"
  ).matches;

  /* ------------------------------------------------------------------------
     1. AMBIENT FLOATING HEARTS
     Small, translucent heart glyphs slowly rising in the background.
     Regenerated on a loop with randomized size, position, speed, delay.
  ------------------------------------------------------------------------ */

  const ambientContainer = document.getElementById("ambientHearts");
  const AMBIENT_COUNT = prefersReducedMotion ? 0 : 10;

  function spawnAmbientHeart() {
    const heart = document.createElement("span");
    heart.className = "ambient-heart";
    heart.innerHTML = "&#10084;"; // ❤ glyph, styled via CSS (muted gold)

    const size = 12 + Math.random() * 16; // 12px - 28px
    const left = Math.random() * 100; // vw %
    const duration = 14 + Math.random() * 10; // 14s - 24s
    const delay = Math.random() * 12; // stagger start

    heart.style.left = left + "vw";
    heart.style.fontSize = size + "px";
    heart.style.animationDuration = duration + "s";
    heart.style.animationDelay = delay + "s";

    ambientContainer.appendChild(heart);
  }

  for (let i = 0; i < AMBIENT_COUNT; i++) {
    spawnAmbientHeart();
  }

  /* ------------------------------------------------------------------------
     2. "SEND LOVE" BUTTON — gentle heart burst via canvas
     A restrained, elegant burst: a handful of soft hearts rise and fade,
     not a loud confetti explosion.
  ------------------------------------------------------------------------ */

  const canvas = document.getElementById("loveCanvas");
  const ctx = canvas.getContext("2d");
  const sendLoveBtn = document.getElementById("sendLoveBtn");

  let particles = [];
  let animationFrame = null;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // Muted, premium palette for the burst hearts
  const BURST_COLORS = ["#b9873f", "#c9a1a8", "#8b5d66", "#d3a862"];

  function createParticle(originX, originY) {
    const angle = (Math.random() * Math.PI) / 2 + Math.PI / 4; // upward spread
    const speed = 1.4 + Math.random() * 1.8;
    return {
      x: originX,
      y: originY,
      vx: Math.cos(angle) * speed * (Math.random() < 0.5 ? -1 : 1),
      vy: -Math.abs(Math.sin(angle) * speed) - 1,
      size: 10 + Math.random() * 10,
      color: BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)],
      life: 0,
      maxLife: 70 + Math.random() * 40,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.05,
    };
  }

  function drawHeart(x, y, size, color, alpha, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;

    // Simple heart path scaled to `size`
    ctx.beginPath();
    const s = size / 20;
    ctx.moveTo(0, 6 * s);
    ctx.bezierCurveTo(-10 * s, -4 * s, -6 * s, -12 * s, 0, -6 * s);
    ctx.bezierCurveTo(6 * s, -12 * s, 10 * s, -4 * s, 0, 6 * s);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p) => {
      p.life++;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.015; // gentle gravity, keeps rise soft
      p.vx *= 0.99;
      p.rotation += p.rotationSpeed;

      const lifeRatio = p.life / p.maxLife;
      const alpha = Math.max(0, 1 - lifeRatio) * 0.85;

      drawHeart(p.x, p.y, p.size, p.color, alpha, p.rotation);
    });

    particles = particles.filter((p) => p.life < p.maxLife);

    if (particles.length > 0) {
      animationFrame = requestAnimationFrame(animate);
    } else {
      animationFrame = null;
    }
  }

  function burstFromButton() {
    const rect = sendLoveBtn.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;

    const count = prefersReducedMotion ? 0 : 16;
    for (let i = 0; i < count; i++) {
      particles.push(createParticle(originX, originY));
    }

    if (!animationFrame && particles.length > 0) {
      animationFrame = requestAnimationFrame(animate);
    }
  }

  sendLoveBtn.addEventListener("click", function () {
    burstFromButton();

    // Small, tasteful acknowledgement — button briefly confirms the action
    const original = sendLoveBtn.innerHTML;
    sendLoveBtn.innerHTML = "<span>Sent with Love</span> \u2764\ufe0f";
    sendLoveBtn.disabled = true;

    setTimeout(() => {
      sendLoveBtn.innerHTML = original;
      sendLoveBtn.disabled = false;
    }, 1600);
  });
})();

  </script>
</body>
</html>
